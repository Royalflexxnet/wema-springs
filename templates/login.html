{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="container py-5"><div class="row justify-content-center"><div class="col-md-5"><div class="card"><div class="card-header"><h3>Login</h3></div><div class="card-body"><form method="POST"><div class="mb-3"><label>Phone or Username</label><input type="text" name="login_id" class="form-control" required></div><div class="mb-3"><label>Password</label><input type="password" name="password" class="form-control" required></div><button type="submit" class="btn btn-primary w-100">Login</button></form><div class="mt-3"><a href="{{ url_for('register') }}">Register</a></div></div></div></div></div></div>
{% endblock %}
