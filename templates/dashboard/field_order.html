{% extends "base.html" %}
{% block title %}Field Orders{% endblock %}
{% block content %}
<div class="container-fluid"><div class="row"><div class="col-md-2 sidebar d-none d-md-block p-0"><nav class="nav flex-column p-3"><a class="nav-link" href="{{ url_for('admin_dashboard') }}">Dashboard</a><a class="nav-link active" href="{{ url_for('field_order') }}">Field Orders</a></nav></div>
<div class="col-md-10 col-12 py-3"><div class="row"><div class="col-12 col-md-5 mb-3"><div class="card"><div class="card-header" style="background:#8b5cf6;"><h5>Place Order</h5></div><div class="card-body p-3"><form action="{{ url_for('place_field_order') }}" method="POST">
<div class="mb-2"><label class="form-label">Client</label><select name="client_id" class="form-control" required><option value="">-- Select --</option>{% for c in clients %}<option value="{{ c.id }}">{{ c.name }} - {{ c.phone_number }}</option>{% endfor %}</select></div>
<div class="mb-2"><label class="form-label">Product</label><select name="product_id" class="form-control" required>{% for p in products %}<option value="{{ p.id }}">{{ p.name }} - KES {{ "%.2f"|format(p.price) }}</option>{% endfor %}</select></div>
<div class="mb-2"><label class="form-label">Qty</label><input type="number" name="quantity" class="form-control" value="1" required></div>
<div class="mb-2"><label class="form-label">Address</label><input type="text" name="delivery_address" class="form-control"></div>
<div class="mb-2"><label class="form-label">Payment</label><select name="payment_method" class="form-control"><option value="cash">Cash</option><option value="mpesa">M-Pesa</option></select></div>
<div class="mb-2"><label class="form-label">M-Pesa Code</label><input type="text" name="mpesa_code" class="form-control"></div>
<button type="submit" class="btn w-100 text-white" style="background:#8b5cf6;">Place Order</button></form></div></div></div>
<div class="col-12 col-md-7"><div class="card"><div class="card-header"><h5>My Recent Orders</h5></div><div class="card-body p-2"><table class="table table-sm"><thead><tr><th>ID</th><th>Client</th><th>Total</th></tr></thead><tbody>{% for o in my_orders %}<tr><td>#{{ o.id }}</td><td>{{ o.customer.name }}</td><td>KES {{ "%.2f"|format(o.total_amount) }}</td></tr>{% endfor %}</tbody></table></div></div></div></div></div></div></div>
{% endblock %}
