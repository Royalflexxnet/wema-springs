{% extends "base.html" %}
{% block title %}Customers{% endblock %}
{% block content %}
<div class="container-fluid"><div class="row"><div class="col-md-2 sidebar d-none d-md-block p-0"><nav class="nav flex-column p-3"><a class="nav-link" href="{{ url_for('admin_dashboard') }}">Dashboard</a><a class="nav-link active" href="{{ url_for('manage_customers') }}">Customers</a></nav></div>
<div class="col-md-10 col-12 py-3"><h4>Customers</h4><div class="table-responsive"><table class="table table-sm"><thead><tr><th>Name</th><th>Phone</th><th>Area</th></tr></thead><tbody>{% for c in customers %}<tr><td>{{ c.name }}</td><td>{{ c.phone_number }}</td><td>{{ c.area_of_residence or '-' }}</td></tr>{% endfor %}</tbody></table></div></div></div></div>
{% endblock %}
