{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="container py-5"><div class="row justify-content-center"><div class="col-md-6"><div class="card"><div class="card-header"><h3>Create Account</h3></div><div class="card-body"><form method="POST"><div class="mb-3"><label>Full Name *</label><input type="text" name="name" class="form-control" required></div><div class="mb-3"><label>Phone *</label><input type="text" name="phone_number" class="form-control" required></div><div class="mb-3"><label>Email</label><input type="email" name="email" class="form-control"></div><div class="mb-3"><label>Area *</label><input type="text" name="area_of_residence" class="form-control" required></div><div class="mb-3"><label>Customer Type</label><select name="customer_type" class="form-control"><option value="pure">Pure</option><option value="salt">Salt</option><option value="both">Both</option></select></div><div class="mb-3"><label>Password *</label><input type="password" name="password" class="form-control" required></div><div class="mb-3"><label>Confirm *</label><input type="password" name="confirm_password" class="form-control" required></div><button type="submit" class="btn btn-primary w-100">Register</button></form></div></div></div></div></div>
{% endblock %}
