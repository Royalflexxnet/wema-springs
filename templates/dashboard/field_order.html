{% extends "base.html" %}
{% block title %}Field Orders{% endblock %}
{% block content %}
<div class="container-fluid"><div class="row"><div class="col-md-2 sidebar"><nav class="nav flex-column"><a class="nav-link" href="{{ url_for('admin_dashboard') }}">Dashboard</a><a class="nav-link active" href="{{ url_for('field_order') }}">Field Orders</a></nav></div><div class="col-md-10 py-4"><div class="row"><div class="col-md-5"><div class="card"><div class="card-header" style="background:#8b5cf6;"><h5>Place Order</h5></div><form action="{{ url_for('place_field_order') }}" method="POST"><div class="mb-3"><label>Client</label><select name="client_id" class="form-control" required>{% for c in clients %}<option value="{{ c.id }}">{{ c.name }} ({{ c.customer_type }})</option>{% endfor %}</select></div><div class="mb-3"><label>Product</label><select name="product_id" class="form-control" required>{% for p in products %}<option value="{{ p.id }}">{{ p.name }} ({{ p.water_type }}) KES {{ "%.2f"|format(p.price) }}</option>{% endfor %}</select></div><div class="mb-3"><label>Qty</label><input type="number" name="quantity" class="form-control" value="1" required></div><div class="mb-3"><label>Address</label><input type="text" name="delivery_address" class="form-control"></div><div class="mb-3"><label>Payment</label><select name="payment_method" class="form-control"><option>cash</option><option>mpesa</option></select></div><div class="mb-3"><label>M-Pesa Code</label><input type="text" name="mpesa_code" class="form-control"></div><button type="submit" class="btn text-white w-100" style="background:#8b5cf6;">Place Order</button></form></div></div></div><div class="col-md-7"><div class="card"><div class="card-header"><h5>My Orders</h5></div><table class="table table-sm"><thead><tr><th>ID</th><th>Client</th><th>Total</th></tr></thead><tbody>{% for o in my_orders %}<tr><td>#{{ o.id }}</td><td>{{ o.customer.name }}</td><td>KES {{ "%.2f"|format(o.total_amount) }}</td></tr>{% endfor %}</tbody></table></div></div></div></div></div>
{% endblock %}
