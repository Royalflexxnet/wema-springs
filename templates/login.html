{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="container py-4"><div class="row justify-content-center"><div class="col-11 col-md-5"><div class="card"><div class="card-header text-center"><h4>Login</h4></div><div class="card-body p-3"><form method="POST"><div class="mb-3"><label class="form-label">Phone or Username</label><input type="text" name="login_id" class="form-control" required></div><div class="mb-3"><label class="form-label">Password</label><input type="password" name="password" class="form-control" required></div><button type="submit" class="btn btn-primary w-100">Login</button></form><div class="text-center mt-2"><small>No account? <a href="{{ url_for('register') }}">Register</a></small></div></div></div></div></div></div>
{% endblock %}
