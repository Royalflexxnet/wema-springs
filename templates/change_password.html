{% extends "base.html" %}
{% block title %}Change Password{% endblock %}
{% block content %}
<div class="container py-5"><div class="row justify-content-center"><div class="col-md-5"><div class="card"><div class="card-header text-center"><h3><i class="bi bi-key"></i> Change Password</h3></div><div class="card-body p-4"><form method="POST">
<div class="mb-3"><label>Current Password</label><input type="password" name="current_password" class="form-control" required></div>
<div class="mb-3"><label>New Password</label><input type="password" name="new_password" class="form-control" required></div>
<div class="mb-3"><label>Confirm New Password</label><input type="password" name="confirm_password" class="form-control" required></div>
<button type="submit" class="btn btn-primary w-100">Change Password</button></form></div></div></div></div></div>
{% endblock %}
