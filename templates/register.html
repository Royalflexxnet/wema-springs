{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="container py-4"><div class="row justify-content-center"><div class="col-11 col-md-6"><div class="card"><div class="card-header text-center"><h4>Create Account</h4></div><div class="card-body p-3"><form method="POST"><div class="mb-2"><label class="form-label">Full Name *</label><input type="text" name="name" class="form-control" required></div><div class="mb-2"><label class="form-label">Phone *</label><input type="text" name="phone_number" class="form-control" required></div><div class="mb-2"><label class="form-label">Email</label><input type="email" name="email" class="form-control"></div><div class="mb-2"><label class="form-label">Area</label><input type="text" name="area_of_residence" class="form-control"></div><div class="mb-2"><label class="form-label">Password *</label><input type="password" name="password" class="form-control" required></div><div class="mb-2"><label class="form-label">Confirm *</label><input type="password" name="confirm_password" class="form-control" required></div><button type="submit" class="btn btn-primary w-100 mt-2">Register</button></form></div></div></div></div></div>
{% endblock %}
