services:
  - type: web
    name: wema-springs
    runtime: python
    repo: https://github.com/Royalflexxnet/wema-springs
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: wema-springs-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: wema-springs-db
    plan: free
    region: oregon
