{% extends "base.html" %}
{% block title %}Walk-in Sale{% endblock %}
{% block content %}
<div class="container-fluid"><div class="row"><div class="col-md-2 sidebar"><nav><a class="nav-link" href="{{ url_for('admin_dashboard') }}">Dashboard</a><a class="nav-link active" href="{{ url_for('walkin_sale') }}">Walk-in</a></nav></div><div class="col-md-10 py-4"><div class="row"><div class="col-md-5"><div class="card"><div class="card-header" style="background:#059669;"><h5>Record Sale</h5></div><form action="{{ url_for('record_walkin_sale') }}" method="POST"><select name="product_id" class="form-control mb-2">{% for p in products %}<option value="{{ p.id }}">{{ p.name }} ({{ p.water_type }}) KES {{ "%.2f"|format(p.price) }}</option>{% endfor %}</select><input type="number" name="quantity" value="1" class="form-control mb-2"><select name="payment_method" class="form-control mb-2"><option>cash</option><option>mpesa</option></select><input type="text" name="mpesa_code" class="form-control mb-2" placeholder="M-Pesa"><input type="text" name="customer_name" class="form-control mb-2" value="Walk-in"><button type="submit" class="btn btn-success w-100">Record</button></form></div></div></div><div class="col-md-7"><div class="card"><div class="card-header"><h5>Today</h5></div><table class="table table-sm"><thead><tr><th>Time</th><th>Product</th><th>Total</th></tr></thead><tbody>{% for s in today_sales %}<tr><td>{{ s.sale_date.strftime('%H:%M') }}</td><td>{{ s.product.name }}</td><td>KES {{ "%.2f"|format(s.total_amount) }}</td></tr>{% endfor %}</tbody></table></div></div></div></div></div>
{% endblock %}
