{% extends "base.html" %}
{% block title %}Change Password{% endblock %}
{% block content %}
<div class="container py-5"><div class="row justify-content-center"><div class="col-md-5"><div class="card"><div class="card-header"><h3>Change Password</h3></div><div class="card-body"><form method="POST"><div class="mb-3"><label>Current</label><input type="password" name="old_password" class="form-control" required></div><div class="mb-3"><label>New</label><input type="password" name="new_password" class="form-control" required></div><div class="mb-3"><label>Confirm</label><input type="password" name="confirm_password" class="form-control" required></div><button type="submit" class="btn btn-primary w-100">Update</button></form></div></div></div></div></div>
{% endblock %}
