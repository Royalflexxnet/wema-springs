{% extends "base.html" %}
{% block title %}Wema Springs - Home{% endblock %}
{% block content %}
<section class="hero-section"><div class="container"><div class="row align-items-center"><div class="col-lg-6"><h1 class="hero-title">Pure Water, Pure Life</h1><p class="lead text-white mb-4">Fresh spring water delivered.</p><div class="d-flex gap-2 flex-wrap"><a href="{{ url_for('shop_retail') }}" class="btn btn-gold">Retail Shop</a><a href="{{ url_for('shop_wholesale') }}" class="btn btn-outline-light">Wholesale</a></div></div><div class="col-lg-6 text-center d-none d-lg-block"><i class="bi bi-droplet-fill" style="font-size:12rem;color:rgba(255,255,255,0.3);"></i></div></div></div></section>
<section class="py-4"><div class="container"><h3 class="text-center mb-4">Retail Products</h3><div class="row">{% for p in retail_products %}<div class="col-6 col-md-3 mb-3"><div class="card"><div class="card-body text-center p-3"><h6>{{ p.name }}</h6><h5 class="text-primary">KES {{ "%.2f"|format(p.price) }}</h5></div></div></div>{% endfor %}</div></div></section>
{% endblock %}
