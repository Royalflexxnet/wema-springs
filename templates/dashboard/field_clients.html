{% extends "base.html" %}
{% block title %}My Clients{% endblock %}
{% block content %}
<div class="container py-4"><h2>My Clients</h2><table class="table"><thead><tr><th>Name</th><th>Phone</th><th>Area</th></tr></thead><tbody>{% for c in clients %}<tr><td>{{ c.name }}</td><td>{{ c.phone_number }}</td><td>{{ c.area_of_residence or '-' }}</td></tr>{% endfor %}</tbody></table></div>
{% endblock %}
