{% extends "base.html" %}
{% block title %}Inventory{% endblock %}
{% block content %}
<div class="container-fluid"><div class="row"><div class="col-md-2 sidebar"><nav><a class="nav-link" href="{{ url_for('admin_dashboard') }}">Dashboard</a><a class="nav-link active" href="{{ url_for('inventory') }}">Inventory</a></nav></div><div class="col-md-10 py-4"><div class="d-flex justify-content-between"><h2>Inventory</h2><button class="btn btn-gold" data-bs-toggle="modal" data-bs-target="#addStockModal">Add Stock</button></div><table class="table"><thead><tr><th>Product</th><th>Type</th><th>Price</th><th>Stock</th></tr></thead><tbody>{% for p in products %}<tr><td>{{ p.name }}</td><td>{{ p.water_type }}</td><td>KES {{ "%.2f"|format(p.price) }}</td><td>{{ p.stock_quantity }}</td></tr>{% endfor %}</tbody></table></div></div></div>
{% endblock %}
